[functions]
  directory = "netlify/functions"

[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # SUPABASE_URL is the public project URL — intentionally embedded in the frontend bundle.
  # VITE_SUPABASE_URL (same value) is inlined by Vite, so Netlify's scanner flags it.
  # INDEXNOW_KEY is an IndexNow verification key — by that protocol's own design it MUST be
  # public (published at https://getbrandgeo.com/<key>.txt), and the literal value also sits
  # in that .txt file inside this repo, which is what the scanner is actually catching. Not a
  # real secret leak, same category of false positive as SUPABASE_URL above.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,INDEXNOW_KEY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://api.anthropic.com https://api.together.xyz https://api.perplexity.ai"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."collect-prompt"]
  timeout = 26

[functions."collect-claude"]
  timeout = 26

[functions."collect-chatgpt"]
  timeout = 26

[functions."generate-recommendations"]
  timeout = 26

[functions."onboard-client"]
  timeout = 26

[functions."purge-old-results"]
  schedule = "0 3 * * *"

[functions."signup-client"]
  timeout = 15

[functions."resend-invite"]
  timeout = 15

# ── Stripe self-serve auto-provisioning webhook (STRIPE-WEBHOOK-SPEC.md) ──────
# Fast DB writes + one Stripe API read; 15s is plenty. Must NOT call _auth.js —
# authenticated by Stripe signature verification instead.
[functions."stripe-webhook"]
  timeout = 15

# Stripe Customer Portal session (dashboard "Manage billing" button).
[functions."create-portal-session"]
  timeout = 15

# Admin-only: set a client's switcher grouping category.
[functions."set-client-category"]
  timeout = 15

# Admin-only: set a client's manual billing dates (started / paid-until).
[functions."set-client-billing"]
  timeout = 15

# ── Instant Audit Engine (SALES-ENGINE.md §2, CLAUDE.md §10 Component A) ──────
[functions."audit-domain"]
  timeout = 26

[functions."get-audit-report"]
  timeout = 15

[functions."unlock-audit-report"]
  timeout = 15

# run-full-audit-background is a Netlify Background Function (the `-background`
# filename suffix triggers this automatically) — it gets up to 15 minutes and
# doesn't take a `timeout` setting the way synchronous functions above do.

[functions."purge-old-audits"]
  schedule = "0 4 * * *"

# ── Collection queue (SCALE-SPEC.md §3) ───────────────────────────────────────
# Hourly scheduler: enqueues a fresh run for every client whose refresh_cadence
# is due, then kicks the worker. Does nothing for refresh_cadence='manual' (the
# default), so this is inert until cadences are set per client.
[functions."schedule-collections"]
  schedule = "0 * * * *"

# Manual "Run collection" / "Force Refresh" enqueue endpoint (browser-called).
# Fast: writes the queue + one worker kick, no engine calls.
[functions."enqueue-collection"]
  timeout = 15

# collection-worker-background is a Netlify Background Function (the `-background`
# filename suffix gives it up to 15 minutes automatically) — like
# run-full-audit-background, it does NOT take a `timeout` setting.

# ── Manual "notify Google now" trigger (CLAUDE.md — Google Indexing API) ─────
# One outbound call to Google; gated by FORCE_INDEX_KEY (see the file's own
# header comment for the real limits of what this API actually guarantees).
[functions."force-index"]
  timeout = 15

# ── Public site chat assistant (ASSISTANT-SPEC.md) ───────────────────────────
# Proxies Claude Haiku; the function's own internal Haiku timeout is 18s, so it
# MUST have more than Netlify's default 10s or a slightly-slow model call (or a
# cold start) gets killed mid-flight and returns a non-JSON 502 — which the
# widget can only surface as a generic error. 26s gives the 18s call full room.
[functions."assistant"]
  timeout = 26

# Lead capture — fast DB write + parallel HubSpot/Resend calls; 15s is plenty.
[functions."assistant-lead"]
  timeout = 15

# ── Auto-notify search engines of new/changed pages (ping-sitemap.js) ─────────
# Daily: diff the live sitemap against the sitemap_pings table, ping new/changed
# URLs to Google + IndexNow. Automatic replacement for firing force-index by hand.
# 26s so a first-run batch (auth reused across URLs, capped at 25) fits comfortably.
[functions."ping-sitemap"]
  schedule = "0 5 * * *"
  timeout = 26
