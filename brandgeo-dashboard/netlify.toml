[functions]
  directory = "netlify/functions"

[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."collect-prompt"]
  timeout = 26

[functions."onboard-client"]
  timeout = 26
