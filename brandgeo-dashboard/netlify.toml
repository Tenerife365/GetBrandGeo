[functions]
  directory = "netlify/functions"

[build]
  command = "npm install && npm run build"
  publish = "dist"
  # Repo is shared with the marketing site (brandgeo/web/) and blog content
  # (brandgeo/*.md). Without this, Netlify rebuilds+redeploys the dashboard on
  # EVERY push to main regardless of what changed. Skip the build (exit 0)
  # unless something under this directory actually changed.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

[build.environment]
  NODE_VERSION = "22"
  # SUPABASE_URL is the public project URL — intentionally embedded in the frontend bundle.
  # VITE_SUPABASE_URL (same value) is inlined by Vite, so Netlify's scanner flags it.
  # INDEXNOW_KEY is an IndexNow verification key — by that protocol's own design it MUST be
  # public (published at https://getbrandgeo.com/<key>.txt), and the literal value also sits
  # in that .txt file inside this repo, which is what the scanner is actually catching. Not a
  # real secret leak, same category of false positive as SUPABASE_URL above.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,INDEXNOW_KEY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://api.anthropic.com https://api.together.xyz https://api.perplexity.ai"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."collect-prompt"]
  timeout = 26

[functions."collect-claude"]
  timeout = 26

[functions."collect-chatgpt"]
  timeout = 26

[functions."generate-recommendations"]
  timeout = 26

[functions."onboard-client"]
  timeout = 26

# Admin plan change / trial-comp grant: updates clients, writes an audit event,
# resolves client emails and sends a branded notification. Multiple sequential
# calls (Supabase + auth.admin + Resend) need more than the default 10s.
[functions."set-client-plan"]
  timeout = 26

# Daily: revert expired trial/comp grants to Free, notify client + admin.
[functions."expire-plan-grants"]
  schedule = "0 6 * * *"

# Admin-only: resolve a client's login users (one auth.admin lookup per user).
[functions."client-users"]
  timeout = 26

# Admin-only: permanently delete a client, its data, and its login user(s).
# Loops auth.admin.deleteUser per user + several table deletes, so needs > 10s.
[functions."delete-client"]
  timeout = 26

[functions."purge-old-results"]
  schedule = "0 3 * * *"

[functions."signup-client"]
  timeout = 15

[functions."provision-account"]
  timeout = 15

[functions."resend-invite"]
  timeout = 15

# ── Stripe self-serve auto-provisioning webhook (STRIPE-WEBHOOK-SPEC.md) ──────
# Fast DB writes + one Stripe API read; 15s is plenty. Must NOT call _auth.js —
# authenticated by Stripe signature verification instead.
[functions."stripe-webhook"]
  timeout = 15

# Stripe Customer Portal session (dashboard "Manage billing" button).
[functions."create-portal-session"]
  timeout = 15

# Admin-only: set a client's switcher grouping category.
[functions."set-client-category"]
  timeout = 15

# Admin-only: set a client's manual billing dates (started / paid-until).
[functions."set-client-billing"]
  timeout = 15

# ── Instant Audit Engine (SALES-ENGINE.md §2, CLAUDE.md §10 Component A) ──────
[functions."audit-domain"]
  timeout = 26

[functions."get-audit-report"]
  timeout = 15

[functions."unlock-audit-report"]
  timeout = 15

# run-full-audit-background is a Netlify Background Function (the `-background`
# filename suffix triggers this automatically) — it gets up to 15 minutes and
# doesn't take a `timeout` setting the way synchronous functions above do.

[functions."purge-old-audits"]
  schedule = "0 4 * * *"

# ── Collection queue (SCALE-SPEC.md §3) ───────────────────────────────────────
# Hourly scheduler: enqueues a fresh run for every client whose refresh_cadence
# is due, then kicks the worker. Does nothing for refresh_cadence='manual' (the
# default), so this is inert until cadences are set per client.
[functions."schedule-collections"]
  schedule = "0 * * * *"

# Manual "Run collection" / "Force Refresh" enqueue endpoint (browser-called).
# Fast: writes the queue + one worker kick, no engine calls.
[functions."enqueue-collection"]
  timeout = 15

# collection-worker-background is a Netlify Background Function (the `-background`
# filename suffix gives it up to 15 minutes automatically) — like
# run-full-audit-background, it does NOT take a `timeout` setting.

# ── Manual "notify Google now" trigger (CLAUDE.md — Google Indexing API) ─────
# One outbound call to Google; gated by FORCE_INDEX_KEY (see the file's own
# header comment for the real limits of what this API actually guarantees).
[functions."force-index"]
  timeout = 15

# ── Public site chat assistant (ASSISTANT-SPEC.md) ───────────────────────────
# Proxies Claude Haiku; the function's own internal Haiku timeout is 18s, so it
# MUST have more than Netlify's default 10s or a slightly-slow model call (or a
# cold start) gets killed mid-flight and returns a non-JSON 502 — which the
# widget can only surface as a generic error. 26s gives the 18s call full room.
[functions."assistant"]
  timeout = 26

# Lead capture — fast DB write + parallel HubSpot/Resend calls; 15s is plenty.
[functions."assistant-lead"]
  timeout = 15

# ── Auto-notify search engines of new/changed pages (ping-sitemap.js) ─────────
# Daily: diff the live sitemap against the sitemap_pings table, ping new/changed
# URLs to Google + IndexNow. Automatic replacement for firing force-index by hand.
# 26s so a first-run batch (auth reused across URLs, capped at 25) fits comfortably.
[functions."ping-sitemap"]
  schedule = "0 5 * * *"
  timeout = 26

# ── AI Social publishing (social-*.js) ────────────────────────────────────────
# social-publish/social-status loop one provider (Ayrshare) call per platform,
# so up to ~5 sequential HTTP calls -> give them the full 26s window rather than
# the default 10s. social-accounts/social-link make a single call and are quick.
[functions."social-publish"]
  timeout = 26

[functions."social-status"]
  timeout = 26

# Cancels a scheduled post: one provider deletePost call per platform target, so
# it can loop several calls (each with a 23s internal timeout) like social-publish.
[functions."social-delete"]
  timeout = 26

# Reads the provider's own scheduled queue (posts created outside BrandGEO too).
[functions."social-queue"]
  timeout = 26

# Admin-only profile binding. 'list'/'bind' each make 1-2 Ayrshare calls whose
# own client timeout is 23s, so it needs more than Netlify's default 10s.
[functions."social-profile"]
  timeout = 26

# Phase 2: one Claude call (internal timeout 20s) that writes per-platform copy.
# Needs more than the default 10s for the same reason assistant.js does.
[functions."social-generate"]
  timeout = 26

# Social Boost: reads the client's GEO data (prompts/results/recommendations/
# competitors) to build grounded post ideas. DB-only and fast; small margin.
[functions."social-boost"]
  timeout = 15

# Brand Kit: load/save is a fast DB op; the 'suggest' action makes one Haiku call
# (internal timeout 20s) to draft the kit, so it needs the full window.
[functions."social-brandkit"]
  timeout = 26

# Cover-image renderer: composes an on-brand PNG with @napi-rs/canvas (a native
# module) + an embedded font, fetches the client logo, and uploads to Supabase
# Storage. external_node_modules ships the native binary as-is instead of letting
# esbuild try to bundle the .node file. 26s covers the logo fetch + encode + upload.
[functions."social-image"]
  timeout = 26
  external_node_modules = ["@napi-rs/canvas"]

# ── AI SEO (content-action layer, AI-SEO-SPEC.md) ─────────────────────────────
# seo-opportunities: deterministic, reads GEO signals (shared _geo_signals.js)
# and upserts content briefs. DB-only and fast; small margin over the default.
[functions."seo-opportunities"]
  timeout = 15

# seo-draft: one Claude call (internal timeout 22s) that writes a full GEO-scored
# draft. Needs more than the default 10s, same reason as social-generate.
[functions."seo-draft"]
  timeout = 26

# seo-crawl: records a crawl run then fires the background worker fire-and-forget.
# Fast; the actual crawl happens in seo-crawl-background (a Netlify Background
# Function — the `-background` suffix gives it up to 15 min, no timeout entry).
[functions."seo-crawl"]
  timeout = 15

# seo-audit-page: one Haiku call (internal timeout 20s) scoring a crawled page.
[functions."seo-audit-page"]
  timeout = 26
